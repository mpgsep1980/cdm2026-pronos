<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Extracteur CDM 2026</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .match-card { background: #333; border-left: 5px solid #00ff00; padding: 10px; margin: 10px 0; border-radius: 4px; }
        pre { background: #000; padding: 15px; overflow: auto; max-height: 400px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>Résultat de l'extraction</h1>
    <div id="statut">Chargement du fichier JS...</div>
    <div id="liste"></div>

    <script src="data_brute.js"></script>

    <script>
        try {
            const container = document.getElementById('liste');
            const statut = document.getElementById('statut');
            
            if (typeof mesDonneesBrutes === 'undefined') {
                throw new Error("La variable 'mesDonneesBrutes' n'a pas été trouvée.");
            }

            const items = mesDonneesBrutes.items;
            const matchs = [];

            for (let id in items) {
                const item = items[id];

                // On filtre pour ne prendre que les matchs (type "G")
                if (item.eType === "G") {
                    // 1. On l'ajoute à notre tableau de données
                    matchs.push({
                        id: id,
                        equipeA: item.a,
                        equipeB: item.b,
                        date: item.start,
                        description: item.desc
                    });

                    // 2. On l'affiche visuellement sur la page
                    const div = document.createElement('div');
                    div.className = 'match-card';
                    div.innerHTML = `<strong>${item.desc}</strong> (ID: ${id})<br>Date : ${item.start}`;
                    container.appendChild(div);
                }
            } // Fin de la boucle for

            statut.innerHTML = `✅ Extraction réussie : ${matchs.length} matchs trouvés !`;
            
            // 3. On affiche le JSON final en bas de page pour le copier-coller
            const finalPre = document.createElement('pre');
            finalPre.textContent = JSON.stringify(matchs, null, 2);
            document.body.appendChild(finalPre);

        } catch (e) {
            document.getElementById('statut').innerHTML = "❌ Erreur : " + e.message;
            console.error(e);
        }
    </script>
</body>
</html>
